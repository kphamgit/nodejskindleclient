<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <style>
    * { box-sizing: border-box; }
    a { font-size: 20px; }
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    nav { display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 2px solid #eee; }
    nav button { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 1em; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    nav button.active { color: #000; border-bottom-color: #000; font-weight: bold; }
    section { display: none; }
    section.active { display: block; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button.submit { padding: 8px 16px; cursor: pointer; }
    p.message { font-size: 0.9em; margin-top: 8px; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 12px; }
    .review-btn { padding: 4px 12px; font-size: 0.85em; cursor: pointer; border: 1px solid #1a73e8; border-radius: 4px; background: #fff; color: #1a73e8; }
    .review-btn:hover { background: #e8f0fe; }
  </style>
</head>
<body>
  <a href="/" style="display:inline-block;margin-bottom:16px;color:#555;text-decoration:none;">← Home</a>
  <h1>Dashboard</h1>
  <p id="welcome"></p>

  <nav>
    <button class="active" onclick="showSection('books', this)">Books</button>
  </nav>

  <section id="books" class="active">
    <div id="create-book-panel">
      <h2>Create Book</h2>
      <input type="text" id="book-title" placeholder="Title" />
      <button class="submit" onclick="createBook()">Create</button>
      <p class="message" id="book-message"></p>
    </div>

    <h2>All Books</h2>
    <button class="submit" onclick="loadBooks()">Refresh</button>
    <ul id="book-list"></ul>
  </section>

  <script>
    const BASE = '';

    function parseToken(token) {
      try { return JSON.parse(atob(token.split('.')[1])); }
      catch { return null; }
    }

    function getCookie(name) {
      var m = document.cookie.split('; ').find(function(r) { return r.startsWith(name + '='); });
      return m ? decodeURIComponent(m.split('=')[1]) : null;
    }

    const token = sessionStorage.getItem('token') || getCookie('token');
    if (!token) { window.location.href = '/'; }
    const payload = parseToken(token) || {};
    const ROLE = payload.role || 'student';

    document.getElementById('welcome').textContent =
      `Welcome, ${payload.name || 'Guest'} — Role: ${ROLE}`;

    if (ROLE !== 'teacher') {
      document.getElementById('create-book-panel').style.display = 'none';
    }

    function showSection(id, btn) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    async function createBook() {
      const title = document.getElementById('book-title').value.trim();
      const msg = document.getElementById('book-message');

      if (!title) { msg.textContent = 'Title is required.'; return; }

      const res = await fetch(`${BASE}/books`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title }),
      });

      if (res.ok) {
        msg.textContent = 'Book created!';
        document.getElementById('book-title').value = '';
        loadBooks();
      } else {
        const err = await res.json();
        msg.textContent = err.error || 'Something went wrong.';
      }
    }

    function startReview(bookId) {
      window.location.href = `/student/review.html?bookId=${bookId}`;
    }

    async function resetBlanks(bookId) {
      await fetch(`${BASE}/review/reset`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ bookId }),
      });
      loadDueBlanks(bookId);
    }

    async function loadDueBlanks(bookId) {
      const res = await fetch(`${BASE}/review?bookId=${bookId}`, {
        headers: { 'Authorization': `Bearer ${token}` },
      });
      if (!res.ok) return;
      const { paragraphs, nextDue } = await res.json();
      const details = paragraphs.flatMap(p => p.dueWordDetails ?? p.dueWords.map(w => ({ word: w, nextReviewAt: null })));
      const el = document.getElementById(`due-${bookId}`);
      if (!details.length) {
        el.textContent = nextDue
          ? `No blanks due now. Next review: ${new Date(nextDue).toLocaleString()}.`
          : 'No blanks due for review.';
        return;
      }
      el.innerHTML = details.map(d => {
        const time = d.nextReviewAt ? new Date(d.nextReviewAt).toLocaleString() : 'now';
        return `<span style="margin-right:12px;"><b>${d.word}</b>: ${time}</span>`;
      }).join('');
    }

    async function loadBooks() {
      const res = await fetch(`${BASE}/books`);
      const data = await res.json();
      const list = document.getElementById('book-list');
      if (!data.length) { list.innerHTML = '<li>No books found.</li>'; return; }
      list.innerHTML = data.map(b => `
          <li style="flex-direction:column;align-items:flex-start;gap:6px;">
            <div style="display:flex;align-items:center;gap:12px;">
              <a href="/student/book.html?id=${b.id}&role=${ROLE}">${b.title}</a>
              <button class="review-btn" onclick="startReview(${b.id})">Review</button>
              <button class="review-btn" style="color:#c00;border-color:#c00;" onclick="resetBlanks(${b.id})">Reset</button>
            </div>
            <div id="due-${b.id}" style="font-size:0.8em;color:#888;"></div>
          </li>`).join('');
      data.forEach(b => loadDueBlanks(b.id));
    }

    loadBooks();
  </script>
</body>
</html>
