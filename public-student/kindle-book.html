<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    a.back { display: inline-block; margin-bottom: 24px; color: #555; text-decoration: none; font-size: 20px; }
    h1 { font-size: 1.5em; }
    ul { list-style: none; padding: 0; }
    li { padding: 10px 0; border-bottom: 1px solid #eee; }
    li a { font-size: 1.4em; color: #000; text-decoration: none; }
    li a:active { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back" href="/student/kindle-dashboard.html">← Dashboard</a>
  <h1 id="book-title">Loading...</h1>
  <h2>Chapters</h2>
  <ul id="chapter-list"><li>Loading...</li></ul>

  <script>
    function getCookie(name) {
      var cookies = document.cookie.split('; ');
      for (var i = 0; i < cookies.length; i++) {
        if (cookies[i].indexOf(name + '=') === 0) {
          return decodeURIComponent(cookies[i].substring(name.length + 1));
        }
      }
      return null;
    }

    var token = getCookie('token');
    if (!token) { window.location.href = '/'; }

    var bookId = null;
    var parts = window.location.search.slice(1).split('&');
    for (var i = 0; i < parts.length; i++) {
      var kv = parts[i].split('=');
      if (kv[0] === 'id') { bookId = kv[1]; }
    }

    function xhrGet(url, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          try { callback(JSON.parse(xhr.responseText)); }
          catch (e) { callback(null); }
        }
      };
      xhr.send();
    }

    function loadBook() {
      xhrGet('/books/' + bookId, function (book) {
        if (!book) { document.getElementById('book-title').textContent = 'Error loading book'; return; }
        document.getElementById('book-title').textContent = book.title;
        var list = document.getElementById('chapter-list');
        if (!book.chapters || !book.chapters.length) {
          list.innerHTML = '<li>No chapters yet.</li>';
          return;
        }
        var html = '';
        for (var i = 0; i < book.chapters.length; i++) {
          var c = book.chapters[i];
          html += '<li><a href="/student/kindle-chapter.html?id=' + c.id + '&bookId=' + bookId + '">' + c.title + '</a></li>';
        }
        list.innerHTML = html;
      });
    }

    loadBook();
  </script>
</body>
</html>
