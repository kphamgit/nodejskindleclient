<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chapter</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    a.back { display: inline-block; margin-bottom: 24px; color: #555; text-decoration: none; font-size: 20px; }
    h1 { font-size: 1.4em; }
    .section-item { border-bottom: 1px solid #eee; }
    .section-toggle { display: block; width: 100%; text-align: left; padding: 12px 0; background: none; border: none; font-size: 1.4em; font-weight: 500; color: #000; cursor: pointer; text-decoration: underline; }
    .section-toggle:active { background: #f0f0f0; }
    .para-list { display: none; padding: 4px 0 10px 12px; }
    .para-list.open { display: block; }
    .para-list ul { list-style: none; padding: 0; margin: 0; }
    .para-list li { padding: 6px 0; border-bottom: 1px solid #f0f0f0; }
    .para-list li a { color: #000; text-decoration: none; font-size: 1.4em; }
    .para-list li a:active { text-decoration: underline; }
  </style>
</head>
<body>
  <a class="back" id="back-link" href="/student/kindle-dashboard.html">← Back</a>
  <h1 id="chapter-title">Loading...</h1>
  <h2>Sections</h2>
  <div id="section-list"></div>

  <script>
    function getCookie(name) {
      var cookies = document.cookie.split('; ');
      for (var i = 0; i < cookies.length; i++) {
        if (cookies[i].indexOf(name + '=') === 0) {
          return decodeURIComponent(cookies[i].substring(name.length + 1));
        }
      }
      return null;
    }

    var token = getCookie('token');
    if (!token) { window.location.href = '/'; }

    var chapterId = null;
    var bookId = null;
    var parts = window.location.search.slice(1).split('&');
    for (var i = 0; i < parts.length; i++) {
      var kv = parts[i].split('=');
      if (kv[0] === 'id') { chapterId = kv[1]; }
      if (kv[0] === 'bookId') { bookId = kv[1]; }
    }

    if (bookId) {
      document.getElementById('back-link').href = '/student/kindle-book.html?id=' + bookId;
    }

    function xhrGet(url, callback) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          try { callback(JSON.parse(xhr.responseText)); }
          catch (e) { callback(null); }
        }
      };
      xhr.send();
    }

    function toggleSection(sectionId) {
      var panel = document.getElementById('panel-' + sectionId);
      if (panel.className === 'para-list open') {
        panel.className = 'para-list';
      } else {
        panel.className = 'para-list open';
        if (!panel.getAttribute('data-loaded')) {
          panel.innerHTML = '<ul><li>Loading...</li></ul>';
          loadParagraphs(sectionId, panel);
        }
      }
    }

    function loadParagraphs(sectionId, panel) {
      xhrGet('/sections/' + sectionId, function (section) {
        if (!section || !section.paragraphs || !section.paragraphs.length) {
          panel.innerHTML = '<ul><li>No paragraphs yet.</li></ul>';
          panel.setAttribute('data-loaded', '1');
          return;
        }
        var html = '<ul>';
        for (var i = 0; i < section.paragraphs.length; i++) {
          var p = section.paragraphs[i];
          var preview = p.content.substring(0, 60) + (p.content.length > 60 ? '...' : '');
          html += '<li><a href="/student/kindle-paragraph.html?id=' + p.id + '&chapterId=' + chapterId + '&bookId=' + bookId + '">' + preview + '</a></li>';
        }
        html += '</ul>';
        panel.innerHTML = html;
        panel.setAttribute('data-loaded', '1');
      });
    }

    function loadChapter() {
      xhrGet('/chapters/' + chapterId, function (chapter) {
        if (!chapter) { document.getElementById('chapter-title').textContent = 'Error'; return; }
        document.getElementById('chapter-title').textContent = chapter.title;
        var container = document.getElementById('section-list');
        if (!chapter.sections || !chapter.sections.length) {
          container.innerHTML = '<p>No sections yet.</p>';
          return;
        }
        var html = '';
        for (var i = 0; i < chapter.sections.length; i++) {
          var s = chapter.sections[i];
          html += '<div class="section-item">' +
            '<button class="section-toggle" onclick="toggleSection(' + s.id + ')">' + s.title + '</button>' +
            '<div class="para-list" id="panel-' + s.id + '"></div>' +
            '</div>';
        }
        container.innerHTML = html;
      });
    }

    loadChapter();
  </script>
</body>
</html>
