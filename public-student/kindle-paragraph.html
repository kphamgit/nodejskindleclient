<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paragraph</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; line-height: 1.7; }
    a.back { display: inline-block; margin-bottom: 24px; color: #555; text-decoration: none; font-size: 20px; }
    .content { font-size: 1.6em; color: #000; line-height: 2; }
    .blank-btn {
      display: inline-block; width: 60px; height: 22px;
      background: #f0f0f0; border: none; border-bottom: 2px solid #333;
      cursor: pointer; vertical-align: middle; margin: 0 2px;
    }
    .blank-btn:active { background: #e0e0e0; }

    .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.4); }
    .modal-box {
      background: #fff; border-radius: 12px; border: 2px solid #111;
      padding: 28px 32px; margin: 100px auto; max-width: 320px;
      text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .modal-hint { font-size: 1.2em; color: #000; margin: 0 0 16px; }
    .modal-word { font-size: 1.7em; font-weight: bold; color: #1a73e8; display: none; margin: 0 0 16px; }
    #modal-actions button { padding: 10px 24px; font-size: 1.3em; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; margin: 4px; }
    .reveal-btn { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .rating { display: none; margin-top: 12px; }
    .rating p { margin: 0 0 8px; font-size: 0.9em; color: #555; }
    .rating button { width: 48px; height: 40px; font-size: 1em; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; margin: 2px; }
  </style>
</head>
<body>
  <a class="back" id="back-link" href="/student/kindle-dashboard.html">← Back</a>
  <div class="content" id="content"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <p class="modal-hint" id="modal-hint"></p>
      <p class="modal-word" id="modal-word"></p>
      <div id="modal-actions">
        <button id="next-letter-btn" onclick="nextLetter()">Next letter</button>
        <button id="show-def-btn" onclick="showDefinition()">Show definition</button>
        <button class="reveal-btn" id="reveal-btn" onclick="revealWord()">Reveal</button>
        <button onclick="closeModal()">Close</button>
      </div>
      <div class="rating" id="rating">
        <p>How easy was it to recall?</p>
        <div>
          <button onclick="rateWord(1)">1</button>
          <button onclick="rateWord(2)">2</button>
          <button onclick="rateWord(3)">3</button>
          <button onclick="rateWord(4)">4</button>
        </div>
        <p style="font-size:0.8em;color:#aaa;">1 = easiest &nbsp; 4 = hardest</p>
      </div>
    </div>
  </div>

  <script>
    function getCookie(name) {
      var cookies = document.cookie.split('; ');
      for (var i = 0; i < cookies.length; i++) {
        if (cookies[i].indexOf(name + '=') === 0) {
          return decodeURIComponent(cookies[i].substring(name.length + 1));
        }
      }
      return null;
    }

    var token = getCookie('token');
    if (!token) { window.location.href = '/'; }

    var paragraphId = null;
    var chapterId = null;
    var bookId = null;
    var parts = window.location.search.slice(1).split('&');
    for (var i = 0; i < parts.length; i++) {
      var kv = parts[i].split('=');
      if (kv[0] === 'id')         { paragraphId = kv[1]; }
      if (kv[0] === 'chapterId')  { chapterId = kv[1]; }
      if (kv[0] === 'bookId')     { bookId = kv[1]; }
    }

    if (chapterId) {
      var backHref = '/student/kindle-chapter.html?id=' + chapterId;
      if (bookId) { backHref += '&bookId=' + bookId; }
      document.getElementById('back-link').href = backHref;
    }

    var currentWord = '';
    var currentHint = '';
    var currentLetterCount = 1;

    function tokenize(text) {
      return text.match(/\[[^\]]*\][.,!?;:]*|\S+/g) || [];
    }

    function parseWordToken(t) {
      var m = t.match(/^\[([^\]]+)\]([.,!?;:]*)$/);
      if (m) {
        var starIdx = m[1].indexOf('*');
        if (starIdx !== -1) {
          return { word: m[1].slice(0, starIdx), hint: m[1].slice(starIdx + 1), punct: m[2], bracketed: true };
        }
        return { word: m[1], hint: '', punct: m[2], bracketed: true };
      }
      var wm = t.match(/^(.+?)([.,!?;:]*)$/);
      return wm
        ? { word: wm[1], hint: '', punct: wm[2], bracketed: false }
        : { word: t,    hint: '', punct: '',     bracketed: false };
    }

    function escAttr(s) {
      return s.replace(/&/g, '&amp;').replace(/"/g, '&quot;').replace(/</g, '&lt;');
    }

    function renderContent(text) {
      var tokens = tokenize(text);
      var html = '';
      for (var i = 0; i < tokens.length; i++) {
        var p = parseWordToken(tokens[i]);
        if (p.bracketed) {
          html += '<button class="blank-btn"' +
                  ' data-word="' + escAttr(p.word) + '"' +
                  ' data-hint="' + escAttr(p.hint) + '"' +
                  ' onclick="openModal(this)"></button>';
          if (p.punct) { html += '<span>' + p.punct + '</span>'; }
        } else {
          html += '<span>' + escAttr(p.word) + p.punct + '</span>';
        }
        html += ' ';
      }
      document.getElementById('content').innerHTML = html;
    }

    function openModal(btn) {
      currentWord = btn.getAttribute('data-word');
      currentHint = btn.getAttribute('data-hint') || '';
      currentLetterCount = 1;
      document.getElementById('modal-hint').textContent = currentWord.charAt(0).toUpperCase() + '...';
      document.getElementById('modal-word').textContent = currentWord;
      document.getElementById('modal-word').style.display = 'none';
      document.getElementById('next-letter-btn').style.display = currentWord.length > 1 ? 'inline-block' : 'none';
      document.getElementById('show-def-btn').style.display = 'inline-block';
      document.getElementById('reveal-btn').style.display = 'none';
      document.getElementById('modal-actions').style.display = 'block';
      document.getElementById('rating').style.display = 'none';
      document.getElementById('modal').style.display = 'block';
    }

    function nextLetter() {
      currentLetterCount++;
      document.getElementById('modal-hint').textContent = currentWord.slice(0, currentLetterCount) + '...';
      if (currentLetterCount >= currentWord.length) {
        document.getElementById('next-letter-btn').style.display = 'none';
      }
    }

    function showDefinition() {
      document.getElementById('modal-hint').textContent = currentHint || '(no definition)';
      document.getElementById('next-letter-btn').style.display = 'none';
      document.getElementById('show-def-btn').style.display = 'none';
      document.getElementById('reveal-btn').style.display = 'inline-block';
    }

    function revealWord() {
      document.getElementById('modal-word').style.display = 'block';
      document.getElementById('modal-actions').style.display = 'none';
      document.getElementById('rating').style.display = 'block';
    }

    function rateWord(difficulty) {
      var word = currentWord;
      var xhr = new XMLHttpRequest();
      xhr.open('PATCH', '/paragraphs/' + paragraphId + '/blanks/' + encodeURIComponent(word), true);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Authorization', 'Bearer ' + token);
      xhr.send(JSON.stringify({ difficulty: difficulty }));
      closeModal();
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    function loadParagraph() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', '/paragraphs/' + paragraphId, true);
      xhr.onreadystatechange = function () {
        if (xhr.readyState === 4) {
          var data;
          try { data = JSON.parse(xhr.responseText); }
          catch (e) { document.getElementById('content').textContent = 'Error loading paragraph.'; return; }
          renderContent(data.content);

          // Initialize blanks for this user (fire and forget)
          var init = new XMLHttpRequest();
          init.open('POST', '/paragraphs/' + paragraphId + '/init-blanks', true);
          init.setRequestHeader('Authorization', 'Bearer ' + token);
          init.send();
        }
      };
      xhr.send();
    }

    loadParagraph();
  </script>
</body>
</html>
