<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paragraph</title>
  <script src="/student/fetch-polyfill.js"></script>
  <style>
    * { box-sizing: border-box; }
    a { font-size: 20px; }
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; line-height: 1.7; }
    a.back { display: inline-block; margin-bottom: 24px; color: #555; text-decoration: none; }
    a.back:hover { text-decoration: underline; }
    .content { font-size: 1.2em; color: #000; line-height: 2; }
    .blank-btn {
      display: inline-block;
      width: 60px;
      height: 22px;
      background: #f0f0f0;
      border: none;
      border-bottom: 2px solid #333;
      cursor: pointer;
      vertical-align: middle;
      margin: 0 2px;
    }
    .blank-btn:hover { background: #e0e0e0; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    .modal-box {
      background: #fff;
      border-radius: 12px;
      border: 2px solid #111;
      padding: 28px 32px;
      min-width: 240px;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .modal-hint { font-size: 1.2em; color: #000; margin: 0 0 16px; }
    .modal-letters { font-size: 1.2em; color: #555; margin: 0 0 12px; min-height: 0; }
    .modal-word { font-size: 1.7em; font-weight: bold; color: #1a73e8; display: none; margin: 0 0 16px; }
    .modal-actions { display: flex; gap: 8px; justify-content: center; }
    .modal-actions button { padding: 8px 20px; font-size: 1em; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
    .modal-actions .reveal-btn { background: #1a73e8; color: #fff; border-color: #1a73e8; }
    .rating-btns { display: none; gap: 8px; justify-content: center; margin-top: 12px; }
    .rating-btns button { padding: 8px 16px; font-size: 1em; cursor: pointer; border-radius: 4px; border: 1px solid #ccc; background: #fff; }
  </style>
</head>
<body>
  <a class="back" id="back-link" href="#">← Back</a>
  <div class="content" id="content-student"></div>

  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <p class="modal-hint" id="modal-hint"></p>
      <p class="modal-letters" id="modal-letters"></p>
      <p class="modal-word" id="modal-word"></p>
      <div class="modal-actions">
        <button id="letter-btn" onclick="showLetter()">First letter</button>
        <button class="reveal-btn" id="reveal-btn" onclick="revealWord()">Reveal</button>
        <button onclick="closeModal()">Close</button>
      </div>
      <div class="rating-btns" id="rating-btns">
        <button onclick="rateWord(1)">1</button>
        <button onclick="rateWord(2)">2</button>
        <button onclick="rateWord(3)">3</button>
        <button onclick="rateWord(4)">4</button>
      </div>
    </div>
  </div>

  <script>
    const BASE = '';

    function getCookie(name) {
      var m = document.cookie.split('; ').find(function(r) { return r.startsWith(name + '='); });
      return m ? decodeURIComponent(m.split('=')[1]) : null;
    }

    const token = sessionStorage.getItem('token') || getCookie('token');
    if (!token) { window.location.href = '/'; }
    const params = new URLSearchParams(window.location.search);
    const paragraphId = Number(params.get('id'));
    const role = params.get('role');
    const chapterId = params.get('chapterId');

    document.getElementById('back-link').href = `/student/chapter.html?id=${chapterId}&role=${role}`;

    function tokenize(text) {
      return text.match(/\[[^\]]*\][.,!?;:]*|\S+/g) || [];
    }

    function parseToken(token) {
      const m = token.match(/^\[([^\]]+)\]([.,!?;:]*)$/);
      if (m) {
        const starIdx = m[1].indexOf('*');
        if (starIdx !== -1) {
          return { word: m[1].slice(0, starIdx), hint: m[1].slice(starIdx + 1), punct: m[2], bracketed: true };
        }
        return { word: m[1], hint: '', punct: m[2], bracketed: true };
      }
      const wm = token.match(/^(.+?)([.,!?;:]*)$/);
      return wm
        ? { word: wm[1], hint: '', punct: wm[2], bracketed: false }
        : { word: token, hint: '', punct: '', bracketed: false };
    }

    function renderStudentContent(text) {
      const container = document.getElementById('content-student');
      container.innerHTML = tokenize(text).map(token => {
        const { word, hint, punct, bracketed } = parseToken(token);
        if (bracketed) {
          const safeWord = word.replace(/"/g, '&quot;');
          const safeHint = hint.replace(/"/g, '&quot;');
          return `<button class="blank-btn" data-word="${safeWord}" data-hint="${safeHint}" onclick="openModal(this)"></button>${punct ? `<span>${punct}</span>` : ''}`;
        }
        return `<span>${word}${punct}</span>`;
      }).join(' ');
    }

    let currentWord = '';
    let currentHint = '';
    let currentLetterCount = 1;

    function openModal(btn) {
      currentWord = btn.dataset.word;
      currentHint = btn.dataset.hint || '';
      currentLetterCount = 0;
      document.getElementById('modal-hint').textContent = currentHint || '(no definition)';
      document.getElementById('modal-letters').textContent = '';
      document.getElementById('modal-word').textContent = currentWord;
      document.getElementById('modal-word').style.display = 'none';
      document.getElementById('letter-btn').textContent = 'First letter';
      document.getElementById('letter-btn').style.display = 'inline-block';
      document.getElementById('reveal-btn').style.display = 'inline-block';
      document.getElementById('rating-btns').style.display = 'none';
      document.getElementById('modal').style.display = 'flex';
    }

    function showLetter() {
      currentLetterCount++;
      document.getElementById('modal-letters').textContent = currentWord.slice(0, currentLetterCount) + '...';
      document.getElementById('letter-btn').textContent = 'Next letter';
      if (currentLetterCount >= currentWord.length) {
        document.getElementById('letter-btn').style.display = 'none';
      }
    }

    function revealWord() {
      document.getElementById('modal-word').style.display = 'block';
      document.getElementById('letter-btn').style.display = 'none';
      document.getElementById('reveal-btn').style.display = 'none';
      document.getElementById('rating-btns').style.display = 'flex';
    }

    async function rateWord(difficulty) {
      await fetch(`${BASE}/paragraphs/${paragraphId}/blanks/${encodeURIComponent(currentWord)}`, {
        method: 'PATCH',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
        body: JSON.stringify({ difficulty }),
      });
      closeModal();
    }

    function closeModal() {
      document.getElementById('modal').style.display = 'none';
    }

    async function loadParagraph() {
      const res = await fetch(`${BASE}/paragraphs/${paragraphId}`);
      const paragraph = await res.json();
      renderStudentContent(paragraph.content);

      fetch(`${BASE}/paragraphs/${paragraphId}/init-blanks`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
      });
    }

    loadParagraph();
  </script>
</body>
</html>
