<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindle</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    nav { display: flex; gap: 8px; margin-bottom: 32px; border-bottom: 2px solid #eee; }
    nav button { padding: 10px 20px; border: none; background: none; cursor: pointer; font-size: 1em; color: #666; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    nav button.active { color: #000; border-bottom-color: #000; font-weight: bold; }
    section { display: none; }
    section.active { display: block; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button.submit { padding: 8px 16px; cursor: pointer; }
    p.message { font-size: 0.9em; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Kindle</h1>

  <nav>
    <button class="active" onclick="showSection('create-user', this)">Create User</button>
    <button onclick="showSection('login', this)">Login</button>
  </nav>

  <section id="create-user" class="active">
    <h2>Create User</h2>
    <input type="text" id="create-name" placeholder="Name (optional)" />
    <input type="text" id="create-password" placeholder="Password" />
    <button class="submit" onclick="createUser()">Create</button>
    <p class="message" id="create-message"></p>
  </section>

  <section id="login">
    <h2>Login</h2>
    <input type="text" id="login-name" placeholder="Name" />
    <input type="text" id="login-password" placeholder="Password" />
    <button class="submit" onclick="login()">Login</button>
    <p class="message" id="login-message"></p>
  </section>

  <script>
    const BASE = '';

    function showSection(id, btn) {
      document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      btn.classList.add('active');
    }

    async function createUser() {
      const name = document.getElementById('create-name').value.trim();
      const password = document.getElementById('create-password').value.trim();
      const msg = document.getElementById('create-message');

      if (!password) { msg.textContent = 'Password is required.'; return; }

      const res = await fetch(`${BASE}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: name || undefined, password }),
      });

      if (res.ok) {
        msg.textContent = 'User created!';
        document.getElementById('create-name').value = '';
        document.getElementById('create-password').value = '';
      } else {
        const err = await res.json();
        msg.textContent = err.error || 'Something went wrong.';
      }
    }

    async function login() {
      const name = document.getElementById('login-name').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const msg = document.getElementById('login-message');

      if (!name || !password) { msg.textContent = 'Name and password are required.'; return; }

      const res = await fetch(`${BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password }),
      });

      if (res.ok) {
        window.location.href = '/dashboard.html';
      } else {
        const err = await res.json();
        msg.textContent = err.error || 'Invalid credentials.';
      }
    }
  </script>
</body>
</html>
