<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindle</title>
  <style>
    * { box-sizing: border-box; }
    a { font-size: 20px; }
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    input { display: block; width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; cursor: pointer; }
    p.message { font-size: 0.9em; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>Kindle</h1>
  <p id="users-link" style="display:none"><a href="/users.html">View all users</a></p>

  <div id="logout-bar" style="display:none; margin-bottom:16px;">
    <span id="welcome-msg"></span>
    <a href="/dashboard.html" style="margin-left:16px;">Dashboard</a>
    <button onclick="logout()" style="margin-left:16px;">Logout</button>
  </div>

  <div id="main-content">
    <h2>Login</h2>
    <input type="text" id="login-name" placeholder="Name" />
    <input type="text" id="login-password" placeholder="Password" />
    <button onclick="login()">Login</button>
    <p class="message" id="login-message"></p>
  </div>

  <script>
    const BASE = '';

    function parseToken(token) {
      try { return JSON.parse(atob(token.split('.')[1])); }
      catch { return null; }
    }

    function checkSession() {
      const token = sessionStorage.getItem('token');
      if (token) {
        const payload = parseToken(token);
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('logout-bar').style.display = 'block';
        document.getElementById('welcome-msg').textContent =
          `Welcome, ${payload.name} (${payload.role})`;
        if (payload.role === 'teacher') {
          document.getElementById('users-link').style.display = 'block';
        }
      }
    }

    function logout() {
      sessionStorage.removeItem('token');
      document.getElementById('main-content').style.display = 'block';
      document.getElementById('logout-bar').style.display = 'none';
    }

    async function login() {
      const name = document.getElementById('login-name').value.trim();
      const password = document.getElementById('login-password').value.trim();
      const msg = document.getElementById('login-message');

      if (!name || !password) { msg.textContent = 'Name and password are required.'; return; }

      const res = await fetch(`${BASE}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, password }),
      });

      if (res.ok) {
        const data = await res.json();
        sessionStorage.setItem('token', data.token);
        window.location.href = '/dashboard.html';
      } else {
        const err = await res.json();
        msg.textContent = err.error || 'Invalid credentials.';
      }
    }

    checkSession();
  </script>
</body>
</html>
