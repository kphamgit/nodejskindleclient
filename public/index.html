<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kindle Users</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    h2 { margin-top: 32px; }
    input { display: block; width: 100%; box-sizing: border-box; padding: 8px; margin-bottom: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 8px 16px; cursor: pointer; }
    #message { margin-top: 8px; font-size: 0.9em; }
    ul { list-style: none; padding: 0; }
    li { padding: 8px; border-bottom: 1px solid #eee; }
  </style>
</head>
<body>
  <h1>Kindle Users</h1>

  <h2>Create User</h2>
  <input type="email" id="email" placeholder="Email" />
  <input type="text" id="name" placeholder="Name (optional)" />
  <button onclick="createUser()">Create</button>
  <p id="message"></p>

  <h2>All Users</h2>
  <button onclick="loadUsers()">Refresh</button>
  <ul id="user-list"></ul>

  <script>
    const BASE = 'http://localhost:3000';

    async function loadUsers() {
      const res = await fetch(`${BASE}/users`);
      const users = await res.json();
      const list = document.getElementById('user-list');
      list.innerHTML = users.length
        ? users.map(u => `<li><strong>${u.name || '(no name)'}</strong> — ${u.email}</li>`).join('')
        : '<li>No users found.</li>';
    }

    async function createUser() {
      const email = document.getElementById('email').value.trim();
      const name = document.getElementById('name').value.trim();
      const msg = document.getElementById('message');

      if (!email) { msg.textContent = 'Email is required.'; return; }

      const res = await fetch(`${BASE}/users`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, name: name || undefined }),
      });

      if (res.ok) {
        msg.textContent = 'User created!';
        document.getElementById('email').value = '';
        document.getElementById('name').value = '';
        loadUsers();
      } else {
        const err = await res.json();
        msg.textContent = err.error || 'Something went wrong.';
      }
    }

    loadUsers();
  </script>
</body>
</html>
